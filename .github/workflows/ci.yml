name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · smoke suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Byte-compile sources
        run: python -m compileall -q server client

      - name: Initialize schema and run smoke suite
        working-directory: server
        env:
          # Dry-run only: every smoke monkey-patches urlopen to forbid real
          # network sends. The token is a non-functional placeholder.
          TELEGRAM_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: "123456:CI_PLACEHOLDER_NOT_A_REAL_TOKEN"
          TELEGRAM_CHAT_ID: "1"
        run: |
          mkdir -p data
          python -c "from app.main import create_app; create_app()"
          python scripts/run_all_smokes.py

  admin:
    name: Admin · production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        run: npm run build
